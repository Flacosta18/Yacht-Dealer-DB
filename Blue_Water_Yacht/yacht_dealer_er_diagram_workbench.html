
<style>
h2.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}
#erd{padding:8px 0}
#erd svg{max-width:100%}
</style>
<h2 class="sr-only">Blue Water Yacht Dealers ER diagram with 11 tables: Manufacturer, Vessel, Department, Employee, Client, Deal, Financing, Mooring, Part, Service_Order, and Service_Line.</h2>
<div id="erd"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '12px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
    primaryColor: dark ? '#2a2824' : '#f5f3ee',
    primaryBorderColor: dark ? '#4a4740' : '#b0aea6',
    primaryTextColor: dark ? '#c2c0b6' : '#3d3d3a',
    attributeBackgroundColorEven: dark ? '#232220' : '#faf9f6',
    attributeBackgroundColorOdd: dark ? '#1e1d1b' : '#f0eeea',
  },
});

const diagram = `erDiagram
  Manufacturer {
    int manufacturer_id PK
    varchar manufacturer_name
    varchar country_of_origin
    varchar website
    char contact_phone
    varchar contact_email
  }
  Vessel {
    int vessel_id PK
    int manufacturer_id FK
    varchar model
    year year
    varchar vessel_type
    decimal length_ft
    varchar hull_material
    tinyint engine_count
    int engine_hp
    varchar condition_status
    decimal list_price
    varchar vin_hull_id
    varchar availability_status
    date date_acquired
  }
  Department {
    int department_id PK
    varchar department_name
    decimal department_budget
  }
  Employee {
    int employee_id PK
    int department_id FK
    varchar first_name
    varchar last_name
    varchar job_title
    date hire_date
    date termination_date
    decimal salary
    decimal commission_rate
    char phone
    varchar email
    varchar certifications
  }
  Client {
    int client_id PK
    varchar first_name
    varchar last_name
    varchar client_type
    varchar company_name
    varchar street1
    varchar city
    char state
    char zip
    char phone
    varchar email
    varchar boating_experience
    int referred_by FK
    date date_added
  }
  Deal {
    int deal_id PK
    int vessel_id FK
    int client_id FK
    int employee_id FK
    date deal_date
    decimal sale_price
    decimal trade_in_value
    varchar deal_status
    date closing_date
  }
  Financing {
    int financing_id PK
    int deal_id FK
    varchar lender_name
    decimal loan_amount
    decimal down_payment
    decimal interest_rate
    smallint term_months
    decimal monthly_payment
    date approval_date
    varchar approval_status
  }
  Mooring {
    int mooring_id PK
    varchar slip_number
    varchar dock_section
    decimal length_capacity_ft
    decimal daily_rate
    boolean is_occupied
    int vessel_id FK
  }
  Part {
    int part_id PK
    varchar part_number
    varchar part_name
    varchar category
    decimal unit_cost
    decimal sell_price
    int qty_on_hand
    int reorder_level
    varchar supplier_name
  }
  Service_Order {
    int service_order_id PK
    int vessel_id FK
    int client_id FK
    int assigned_tech_id FK
    int mooring_id FK
    date order_date
    date promised_date
    date completion_date
    varchar service_type
    varchar order_status
    decimal labor_hours
    decimal labor_rate
    decimal total_parts_cost
    decimal total_labor_cost
    decimal total_cost
  }
  Service_Line {
    int service_line_id PK
    int service_order_id FK
    int part_id FK
    int quantity_used
    decimal unit_price
    decimal line_total
  }

  Manufacturer ||--o{ Vessel : "produces"
  Department ||--o{ Employee : "employs"
  Vessel ||--o{ Deal : "sold via"
  Client ||--o{ Deal : "makes"
  Employee ||--o{ Deal : "closes"
  Deal ||--o| Financing : "financed by"
  Vessel ||--o{ Service_Order : "serviced in"
  Client ||--o{ Service_Order : "requests"
  Employee ||--o{ Service_Order : "assigned to"
  Mooring ||--o{ Service_Order : "hosts"
  Service_Order ||--o{ Service_Line : "uses"
  Part ||--o{ Service_Line : "listed in"
  Client ||--o{ Client : "refers"
`;

const { svg } = await mermaid.render('erd-svg', diagram);
document.getElementById('erd').innerHTML = svg;

document.querySelectorAll('#erd svg .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg','rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '6');
  for (const a of ['fill','stroke','stroke-width','class','style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});

document.querySelectorAll('#erd svg .attributeBoxOdd path, #erd svg .attributeBoxEven path').forEach(p => {
  p.setAttribute('stroke','none');
});
</script>
